services:
  backend:
    build: ./backend
    container_name: porchlight-backend
    environment:
      PORCHLIGHT_DATABASE_URL: sqlite:////app/runtime-data/porchlight.db
      PORCHLIGHT_DEVICE_TOKEN: dev-device-token
      PORCHLIGHT_DASHBOARD_ORIGIN: http://localhost:5173
      PORCHLIGHT_ENABLE_SEED: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./runtime-data/backend:/app/runtime-data
      - ./demo-assets:/app/demo-assets:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  dashboard:
    build: ./dashboard
    container_name: porchlight-dashboard
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    container_name: porchlight-simulator
    environment:
      PORCHLIGHT_BACKEND_URL: http://backend:8000
      PORCHLIGHT_AUTH_TOKEN: dev-device-token
      PORCHLIGHT_DEVICE_ID: porch-sim-001
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./demo-assets:/app/demo-assets:ro

  broker:
    image: eclipse-mosquitto:2
    container_name: porchlight-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
